server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend service (strips the /api prefix)
    # This mirrors the Vite dev proxy so the frontend code never changes
    # between development and production — it always calls /api/...
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE / streaming support:
        # Disable buffering so tokens reach the browser immediately.
        # proxy_buffering off is the critical one — without it nginx
        # accumulates the stream and flushes it all at once at the end.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
    }

    # SPA fallback — serve index.html for any path not matched above
    # so React Router (if added later) works on page reload
    location / {
        try_files $uri $uri/ /index.html;
    }
}
